<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create teacher</title>
    <link rel="stylesheet" th:href="@{/admin.css}">
</head>
<body>
<div class="container">
    <div class="card">
        <h1>Create teacher</h1>
        <div class="muted">Fill in user data</div>

        <form th:action="@{/admin/users/teachers/create}" th:object="${form}" method="post" style="margin-top: 18px;">
            <div class="form-grid">
                <div>
                    <label>Email</label>
                    <input th:field="*{email}" type="email" placeholder="teacher@example.com"/>
                </div>

                <div>
                    <label>Password</label>
                    <input th:field="*{password}" type="password" placeholder="Password"/>
                </div>

                <div>
                    <label>First name</label>
                    <input th:field="*{firstName}" type="text" placeholder="Andrey"/>
                </div>

                <div>
                    <label>Last name</label>
                    <input th:field="*{lastName}" type="text" placeholder="Sokolov"/>
                </div>

                <div>
                    <label>Patronymic</label>
                    <input th:field="*{patronymic}" type="text" placeholder="Shriratovich"/>
                </div>

                <div>
                    <label>Department</label>
                    <input th:field="*{department}" type="text" placeholder="IU3"/>
                </div>

                <div>
                    <label>Telegram</label>
                    <input th:field="*{telegram}" type="text" placeholder="@username"/>
                </div>


                <div class="full actions">
                    <button type="submit">Create teacher</button>
                    <a class="button secondary" th:href="@{/admin}">Back</a>
                </div>
            </div>

        </form>
    </div>
</div>
</body>
</html>
