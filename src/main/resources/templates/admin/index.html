<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <link rel="stylesheet" th:href="@{/admin.css}">
</head>
<body>
<div class="container">
    <div class="topbar">
        <div>
            <h1>Admin panel</h1>
        </div>

        <form th:action="@{/admin/logout}" method="post" class="inline">
            <button type="submit" class="secondary">Logout</button>
        </form>
    </div>

    <div class="card">
        <h2>Users</h2>
        <div class="actions">
            <a class="button" th:href="@{/admin/users/students/create}">Create student</a>
            <a class="button" th:href="@{/admin/users/teachers/create}">Create teacher</a>
        </div>

        <div class="table-wrap">
            <table>
                <tr>
                    <th>ID</th>
                    <th>Email</th>
                    <th>Enabled</th>
                    <th>Role</th>
                    <th>Actions</th>
                </tr>
                <tr th:each="user : ${users}">
                    <td th:text="${user.id}"></td>
                    <td th:text="${user.email}"></td>
                    <td>
                        <span th:if="${user.isEnabled}" class="badge success">Yes</span>
                        <span th:unless="${user.isEnabled}" class="badge disabled">No</span>
                    </td>
                    <td th:text="${user.roles[0].toReadableText()}"></td>
                    <td>
                        <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post" class="inline">
                            <button type="submit" class="danger">Delete</button>
                        </form>
                    </td>
                </tr>
            </table>
        </div>
    </div>

    <div class="card">
        <h2>Integrations</h2>
        <div class="actions">
            <a class="button" th:href="@{/admin/integrations/create}">Create integration</a>
        </div>

        <div class="table-wrap">
            <table>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Payload</th>
                    <th>Actions</th>
                </tr>
                <tr th:each="integration : ${integrations}">
                    <td th:text="${integration.id}"></td>
                    <td th:text="${integration.name}"></td>
                    <td th:text="${integration.payload}"></td>
                    <td>
                        <form th:action="@{/admin/integrations/{id}/delete(id=${integration.id})}" method="post" class="inline">
                            <button type="submit" class="danger">Удалить</button>
                        </form>
                    </td>
                </tr>
            </table>
        </div>
    </div>
</div>
</body>
</html>
